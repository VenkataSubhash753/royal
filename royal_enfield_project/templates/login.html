{% extends 'base.html' %}

{% block content %}
<style>
    .login-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        padding: 2rem 1rem;
    }
    .login-card {
        background-color: white;
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
        border-radius: 0.75rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        border-top: 4px solid #b8860b;
    }
    .login-title {
        text-align: center;
        font-size: 1.875rem;
        font-weight: 800;
        color: #111827;
        margin: 0 0 0.5rem 0;
    }
    .login-subtitle {
        text-align: center;
        font-size: 0.875rem;
        color: #4b5563;
        margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #374151;
        margin-bottom: 0.5rem;
    }
    .form-input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        box-sizing: border-box;
    }
    .form-input:focus {
        outline: none;
        border-color: #b8860b;
        box-shadow: 0 0 0 2px rgba(184, 134, 11, 0.2);
    }
    .submit-btn {
        width: 100%;
        background-color: #b8860b;
        color: white;
        padding: 0.75rem;
        border: none;
        border-radius: 0.375rem;
        font-weight: bold;
        cursor: pointer;
        margin-top: 1rem;
    }
    .submit-btn:hover { background-color: #d4af37; }
    .link-wrapper {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.875rem;
    }
    .link-wrapper a {
        color: #4b5563;
        text-decoration: none;
    }
    .link-wrapper a:hover { color: #111827; }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h2 class="login-title">Sign in to Garage</h2>
        <p class="login-subtitle">Manage your orders and modifications</p>
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Email address</label>
                <input id="email" name="email" type="email" required class="form-input" placeholder="admin@royalenfield.com for Admin">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" required class="form-input" placeholder="Password">
            </div>

            <button type="submit" class="submit-btn">Sign in</button>
            
            <div class="link-wrapper">
                <a href="/register">New here? Create an account</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
